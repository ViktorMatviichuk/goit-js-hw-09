<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">Go back</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div>
            <form class="feedback-form" autocomplete="off">
                <label class="feedback-form-label">
                    Email
                    <input class="feedback-form-input" type="email" name="email" autofocus />
                </label>
                <label class="feedback-form-label">
                    Message
                    <textarea class="feedback-form-input" name="message" rows="8"></textarea>
                </label>
                <button class="feedback-form-btn" type="submit">Submit</button>
            </form>
        </div>
    </main>
    <script type="module" src="./js/2-form.js"></script>
</body>

</html>
